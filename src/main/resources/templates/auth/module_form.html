<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">

    <div layout:fragment = "main_content">
        <!-- Content Wrapper. Contains page content -->
        <div class="content-wrapper">
            <!-- Content Header (Page header) -->
            <!-- Main content -->
            <section class="content">
                <section class="content-header">
                    <div class="container-fluid">
                        <div class="row mb-2">
                            <div class="col-sm-6">
                                <h1>  User Management</h1>
                            </div>
                            <div class="col-sm-6">
                                <ol class="breadcrumb float-sm-right">
                                    <li class="breadcrumb-item"><a href="#">Home</a></li>
                                    <li class="breadcrumb-item"><a href="#">Users</a></li>
                                    <li class="breadcrumb-item active">Add Module</li>
                                </ol>
                            </div>
                        </div>
                    </div><!-- /.container-fluid -->
                </section>



                <!-- Main content -->
                <section class="content">

                    <div class="card card-info">
                        <div class="card-header">
                            <h3 class="card-title"  th:text="${modules.id == null ? 'Create Module' : 'Edit Module'}">Add Module</h3>
                            <div class="card-tools">
                                <!-- Buttons, labels, and many other things can be placed here! -->
                                <!-- Here is a label for example -->
                                <a th:href="@{/modules/list}" type="button" class="btn btn-block btn-light text-red  btn-sm pull-right "> Close </i><i class="fas fa-times"></i></a>
                            </div>
                        </div>

                        <div class="card-body ">

                            <div class="container mt-4">
                                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                                <form th:action="@{/modules/save}" th:object="${modules}" method="post" class="mt-3">

                                    <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
                                        <ul class="mb-0">
                                            <li th:each="err : ${#fields.errors('*')}"
                                                th:text="${err}"></li>
                                        </ul>
                                    </div>


                                    <input type="hidden" th:field="*{id}" />
                                    <input type="hidden" th:field="*{version}" />
                                    <input type="hidden" th:field="*{slug}"  />


                                    <div class="mb-3">
                                        <label>Name</label>
                                        <input type="text" th:field="*{name}" class="form-control" />
                                        <div class="text-danger" th:if="${#fields.hasErrors('name')}"
                                             th:errors="*{name}"></div>
                                    </div>

                                    <button type="submit" class="btn btn-success">Save</button>

                                </form>

                            </div>
                        </div>




                    </div>

                </section>
                <!-- /.content -->
        </div>
        <!-- /.content-wrapper -->
    </div>
</div>
